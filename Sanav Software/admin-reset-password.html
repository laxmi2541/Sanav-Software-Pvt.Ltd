<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Password Reset | SANAV SOFTWARE</title>
    <link rel="stylesheet" href="font-awesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0d3b66;
            --accent-gold: #c9a86a;
            --dark-bg: #0a1929;
            --card-bg: #132f4c;
            --text-light: #f0f7ff;
            --text-gray: #b0c4de;
            --error-red: #ff6b6b;
            --success-green: #43e97b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--primary-blue) 100%);
        }

        .auth-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(201, 168, 106, 0.2);
            backdrop-filter: blur(10px);
        }

        .auth-card h2 {
            text-align: center;
            color: var(--accent-gold);
            margin-bottom: 30px;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        .form-group input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(201, 168, 106, 0.3);
            border-radius: 50px;
            color: white;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: var(--accent-gold);
            background: rgba(255,255,255,0.1);
        }

        .requirements {
            font-size: 0.8rem;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .requirements ul {
            padding-left: 20px;
            margin: 5px 0 0;
            color: var(--text-gray);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-gold);
            color: var(--dark-bg);
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 168, 106, 0.4);
            background: #d4b884;
        }
        
        #errorMsg {
            color: var(--error-red);
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: none;
        }

        .links {
            text-align: center;
            margin-top: 25px;
        }

        .links a {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .links a:hover {
            color: var(--accent-gold);
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Set New Admin Password</h2>
        <div id="errorMsg"></div>
        <form id="resetForm">
            <div class="form-group">
                <label>Recovery Token / OTP</label>
                <input type="text" id="tokenField" placeholder="Enter Token" required>
            </div>
            
            <div class="requirements">
                <strong>Password Policy:</strong>
                <ul id="policyList">
                    <li id="reqLength">Minimum 8 characters</li>
                    <li id="reqUpper">At least 1 uppercase letter</li>
                    <li id="reqLower">At least 1 lowercase letter</li>
                    <li id="reqNum">At least 1 number</li>
                    <li id="reqSpec">At least 1 special character (@$!%*?&)</li>
                </ul>
            </div>

            <div class="form-group">
                <label>New Secure Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn" id="submitBtn">Finalize Change</button>
        </form>
        <div class="links">
            <p><a href="admin-login.html">Abort & Return to Login</a></p>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:8080/api";
        const resetForm = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const tokenField = document.getElementById('tokenField');

        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');

        if (urlToken) {
            tokenField.value = urlToken;
        }

        // Live Validation Elements
        const pwInput = document.getElementById('password');
        const rLen = document.getElementById('reqLength');
        const rUpp = document.getElementById('reqUpper');
        const rLow = document.getElementById('reqLower');
        const rNum = document.getElementById('reqNum');
        const rSpc = document.getElementById('reqSpec');

        pwInput.addEventListener('input', () => {
            const val = pwInput.value;
            rLen.style.color = val.length >= 8 ? 'var(--success-green)' : 'var(--text-gray)';
            rUpp.style.color = /[A-Z]/.test(val) ? 'var(--success-green)' : 'var(--text-gray)';
            rLow.style.color = /[a-z]/.test(val) ? 'var(--success-green)' : 'var(--text-gray)';
            rNum.style.color = /\d/.test(val) ? 'var(--success-green)' : 'var(--text-gray)';
            rSpc.style.color = /[@$!%*?&]/.test(val) ? 'var(--success-green)' : 'var(--text-gray)';
        });

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            const token = tokenField.value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Enforce Regex matching exactly
            const strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if (!strongRegex.test(password)) {
                errorMsg.innerText = "Password must contain uppercase, lowercase, number and special character.";
                errorMsg.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorMsg.innerText = "Passwords do not match!";
                errorMsg.style.display = 'block';
                return;
            }

            if (!token) {
                errorMsg.innerText = "Recovery Token is missing!";
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.innerText = 'Updating Infrastructure...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/auth/admin-reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    alert('Admin Password Synchronized Successfully! You may now login.');
                    window.location.href = 'admin-login.html';
                } else {
                    errorMsg.innerText = result.message || 'Token might be invalid or expired. Please re-request access.';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                errorMsg.innerText = 'Connection to Authentication Server Failed.';
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.innerText = 'Finalize Change';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
