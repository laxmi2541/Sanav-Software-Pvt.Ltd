<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login | SANAV SOFTWARE</title>
    <link rel="stylesheet" href="font-awesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0d3b66;
            --accent-gold: #c9a86a;
            --dark-bg: #0a1929;
            --card-bg: #132f4c;
            --text-light: #f0f7ff;
            --text-gray: #b0c4de;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--primary-blue) 100%);
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(201, 168, 106, 0.2);
            backdrop-filter: blur(10px);
        }

        .login-card h2 {
            text-align: center;
            color: var(--accent-gold);
            margin-bottom: 30px;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        .form-group input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(201, 168, 106, 0.3);
            border-radius: 50px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-gold);
            background: rgba(255,255,255,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-gold);
            color: var(--dark-bg);
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 168, 106, 0.4);
            background: #d4b884;
        }

        .links {
            text-align: center;
            margin-top: 25px;
            color: var(--text-gray);
        }

        .links a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>User Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="user@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Login</button>
        </form>
        <div class="links">
            <p><a href="forgot-password.html">Forgot Password?</a></p>
            <p style="margin-top: 10px;">Don't have an account? <a href="register.html">Register</a></p>
            <p style="margin-top: 10px;"><a href="index.html"><i class="fas fa-arrow-left"></i> Home</a></p>
        </div>
    </div>

    <script>
        const API_HOST = window.location.hostname === '127.0.0.1' ? '127.0.0.1' : 'localhost';
        const API_BASE_URL = `http://${API_HOST}:8080/api`;
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.innerText = 'Verifying...';
            loginBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    const loginData = result.data;
                    localStorage.setItem('token', loginData.token);
                    localStorage.setItem('userName', loginData.user.name);
                    localStorage.setItem('userEmail', loginData.user.email);
                    localStorage.setItem('userRole', loginData.user.role);
                    
                    if (loginData.user.role === 'ADMIN') {
                        // Admin attempting normal login, send them to dashboard anyway or refuse
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'index.html'; // Or user-dashboard
                    }
                } else {
                    alert(result.message || 'Invalid credentials');
                }
            } catch (error) {
                console.error('Fetch Error Details:', error);
                
                // Detailed diagnostic message
                let errorMsg = 'Connection failed!';
                if (error instanceof TypeError && error.message.includes('fetch')) {
                    errorMsg += `\n\nTechnical Reason: ${error.message}\n` +
                                `- Is your Spring Boot app RUNNING on port 8080?\n` +
                                `- Is MySQL running? (Check backend logs for DB errors)`;
                } else {
                    errorMsg = `An unexpected error occurred: ${error.message}`;
                }
                alert(errorMsg);
            } finally {
                loginBtn.innerText = 'Login';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
