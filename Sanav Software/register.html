<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SANAV SOFTWARE</title>
    <link rel="stylesheet" href="font-awesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0d3b66;
            --accent-gold: #c9a86a;
            --dark-bg: #0a1929;
            --card-bg: #132f4c;
            --text-light: #f0f7ff;
            --text-gray: #b0c4de;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--primary-blue) 100%);
        }

        .auth-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(201, 168, 106, 0.2);
            backdrop-filter: blur(10px);
        }

        .auth-card h2 {
            text-align: center;
            color: var(--accent-gold);
            margin-bottom: 30px;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(201, 168, 106, 0.3);
            border-radius: 50px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-gold);
            background: rgba(255,255,255,0.1);
        }

        .form-group select option {
            background: var(--card-bg);
            color: white;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-gold);
            color: var(--dark-bg);
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 168, 106, 0.4);
            background: #d4b884;
        }

        .links {
            text-align: center;
            margin-top: 25px;
            color: var(--text-gray);
        }

        .links a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>Join Sanav</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn" id="registerBtn">Create Account</button>
        </form>
        <div class="links">
            <p>Already have an account? <a href="user-login.html">Login</a></p>
            <p style="margin-top: 10px;"><a href="index.html"><i class="fas fa-arrow-left"></i> Home</a></p>
        </div>
    </div>

    <!-- PASTE THE SCRIPT BELOW HERE -->
    <script>
        const API_HOST = window.location.hostname === '127.0.0.1' ? '127.0.0.1' : 'localhost';
        const API_BASE_URL = `http://${API_HOST}:8080/api`;
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Password length validation
            if (password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            registerBtn.innerText = 'Creating Account...';
            registerBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    alert('Registration successful! Please login.');
                    window.location.href = 'user-login.html';
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                console.error('Fetch Error Details:', error);
                
                // Detailed diagnostic message
                let errorMsg = 'Server connection failed!';
                if (error instanceof TypeError && error.message.includes('fetch')) {
                    errorMsg += `\n\nTechnical Reason: ${error.message}\n` +
                                `- Is your Spring Boot app RUNNING on port 8080?\n` +
                                `- Is MySQL running? (Check backend logs for DB errors)`;
                } else {
                    errorMsg = `An unexpected error occurred: ${error.message}`;
                }
                alert(errorMsg);
            } finally {
                registerBtn.innerText = 'Create Account';
                registerBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
