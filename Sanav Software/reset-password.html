<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | SANAV SOFTWARE</title>
    <link rel="stylesheet" href="font-awesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0d3b66;
            --accent-gold: #c9a86a;
            --dark-bg: #0a1929;
            --card-bg: #132f4c;
            --text-light: #f0f7ff;
            --text-gray: #b0c4de;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--primary-blue) 100%);
        }

        .auth-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(201, 168, 106, 0.2);
            backdrop-filter: blur(10px);
        }

        .auth-card h2 {
            text-align: center;
            color: var(--accent-gold);
            margin-bottom: 30px;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        .form-group input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(201, 168, 106, 0.3);
            border-radius: 50px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-gold);
            background: rgba(255,255,255,0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-gold);
            color: var(--dark-bg);
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 168, 106, 0.4);
            background: #d4b884;
        }

        .links {
            text-align: center;
            margin-top: 25px;
            color: var(--text-gray);
        }

        .links a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }
        
        #errorMsg {
            color: #ff6b6b;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Reset Password</h2>
        <div id="errorMsg"></div>
        <form id="resetForm">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn" id="submitBtn">Update Password</button>
        </form>
        <div class="links">
            <p><a href="user-login.html">Back to Login</a></p>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:8080/api";
        const resetForm = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');

        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            errorMsg.innerText = "Invalid or missing token!";
            errorMsg.style.display = 'block';
            submitBtn.disabled = true;
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                errorMsg.innerText = "Passwords do not match!";
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMsg.innerText = "Password must be at least 6 characters long.";
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.innerText = 'Updating...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    alert('Password Changed Successfully!');
                    window.location.href = 'user-login.html';
                } else {
                    errorMsg.innerText = result.message || 'Error occurred';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                errorMsg.innerText = 'Connection failed. Please check if the server is running.';
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.innerText = 'Update Password';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
