<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SANAV SOFTWARE</title>
    <link rel="stylesheet" href="font-awesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0d3b66;
            --accent-gold: #c9a86a;
            --dark-bg: #0a1929;
            --card-bg: #132f4c;
            --text-light: #f0f7ff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(201, 168, 106, 0.2);
        }

        .login-card h2 {
            text-align: center;
            color: var(--accent-gold);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(201, 168, 106, 0.3);
            border-radius: 50px;
            color: white;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent-gold);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent-gold);
            color: var(--dark-bg);
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(201, 168, 106, 0.4);
        }

        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .links a {
            color: var(--accent-gold);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Admin Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="admin@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Login Now</button>
        </form>
        <div class="links">
            <p>Back to <a href="index.html">Home</a></p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.innerText = 'Verifying...';
            loginBtn.disabled = true;

            try {
                // DYNAMIC HOST DETECTION - ensures frontend and backend share same local host
                const API_HOST = window.location.hostname === '127.0.0.1' ? '127.0.0.1' : 'localhost';
                const API_BASE_URL = `http://${API_HOST}:8080/api`;
                const apiUrl = `${API_BASE_URL}/auth/admin-login`;
                
                console.log("Connecting to backend:", apiUrl);

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                console.log("Response status:", response.status);
                const result = await response.json();
                console.log("Login result:", result);

                if (response.ok && result.success) {
                    const loginData = result.data;
                    // Store vital admin information
                    localStorage.setItem('token', loginData.token);
                    localStorage.setItem('user', JSON.stringify(loginData.user));
                    localStorage.setItem('adminName', loginData.user.name || 'Admin');
                    localStorage.setItem('adminEmail', loginData.user.email);
                    
                    console.log("Login successful! Redirecting to dashboard...");
                    window.location.href = 'admin-dashboard.html';
                } else {
                    console.error("Login verification failed:", result.message);
                    alert(result.message || 'Access Denied: Invalid credentials or not an admin.');
                }
            } catch (error) {
                console.error('Fetch Error Details:', error);
                
                // Detailed diagnostic message
                let errorMsg = 'Backend connection failed!';
                if (error instanceof TypeError && error.message.includes('fetch')) {
                    errorMsg += `\n\nTechnical Reason: ${error.message}\n` +
                                `- Is your Spring Boot app RUNNING on port 8080?\n` +
                                `- Is MySQL running? (Check backend logs for DB errors)`;
                } else {
                    errorMsg = `An unexpected error occurred: ${error.message}`;
                }
                alert(errorMsg);
            } finally {
                loginBtn.innerText = 'Login Now';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
